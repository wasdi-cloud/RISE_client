<main class="d-flex flex-column">
  <!-- <rise-toolbar [m_bUserIsSigned]="true"></rise-toolbar> -->
  <div class="flex-fill d-flex flex-row">
    <div class="rise-sidebar d-flex flex-column gap-3 scrollable-sidebar">
      <img
        class="align-self-start"
        src="/assets/rise-assets/logo-white-horizontal.svg"
        alt=""
      />
<!--      <rise-text-input-->
<!--        [m_sLocalizationKey]="'DASHBOARD.SEARCH'"-->
<!--        [m_sIcon]="'search'"-->
<!--        [m_bHasIcon]="true"-->
<!--      ></rise-text-input>-->

      <rise-banner [m_sHeaderKey]="'BANNER.LIVE_SIT'"></rise-banner>
      <rise-affected-widget
        [m_iAffectedPpl]="m_iAffectedPpl"
      ></rise-affected-widget>
      <rise-ongoing-widget
        [m_aoOngoingEvent]="m_aoOngoingEvents"
      ></rise-ongoing-widget>
      <rise-alerts-widget [m_aoAlerts]="m_aoAlerts"></rise-alerts-widget>
    </div>
    <div class="map-container flex-fill">
      <div class="map-user-menu">
        <rise-user-menu class="user-menu"></rise-user-menu>
      </div>

      <div class="map-create-control">
        <rise-button
          class="create-area-btn"
          [m_sLabel]="''"
          [m_sIconLeft]="(m_bEnableAreaDrawing || m_bShowAreaCreationMenu) ? 'close' : 'add'"
          [m_sRole]="m_bEnableAreaDrawing ? 'danger' : 'action'"
          [m_sSize]="'small'"
          (click)="toggleAreaCreationMenu()"
          [title]="m_bEnableAreaDrawing ? 'Cancel drawing' : 'Create new area'"
        ></rise-button>

        <div class="map-create-submenu" *ngIf="m_bShowAreaCreationMenu && !m_bEnableAreaDrawing">
          <rise-button
            class="create-area-sub-btn"
            [m_sLabel]="''"
            [m_sIconLeft]="'rectangle'"
            [m_sRole]="'action'"
            [m_sSize]="'small'"
            (click)="startAreaDrawingCreation()"
            [title]="'Draw rectangle'"
          ></rise-button>
          <rise-button
            class="create-area-sub-btn"
            [m_sLabel]="''"
            [m_sIconLeft]="'pin_invoke'"
            [m_sRole]="'action'"
            [m_sSize]="'small'"
            (click)="startManualBboxCreation()"
            [title]="'Manual bounding box'"
          ></rise-button>
        </div>
      </div>

      <rise-map
        [m_aoAreas]="m_aoAreas"
        [m_bDashboardMap]="true"
        [m_bEnableDashboardDrawing]="m_bEnableAreaDrawing"
        (m_oDashboardAreaDrawn)="onAreaShapeDrawn($event)"
      ></rise-map>
    </div>
  </div>
</main>

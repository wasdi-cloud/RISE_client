<main class="d-flex flex-column">
  <!-- <rise-toolbar [m_bUserIsSigned]="true"></rise-toolbar> -->
  <div class="flex-fill d-flex flex-row">
    <div class="rise-sidebar d-flex flex-column gap-3 scrollable-sidebar">
      <img
        class="align-self-start"
        src="/assets/rise-assets/logo-white-horizontal.svg"
        alt=""
      />
<!--      <rise-text-input-->
<!--        [m_sLocalizationKey]="'DASHBOARD.SEARCH'"-->
<!--        [m_sIcon]="'search'"-->
<!--        [m_bHasIcon]="true"-->
<!--      ></rise-text-input>-->

      <rise-banner [m_sHeaderKey]="'BANNER.LIVE_SIT'"></rise-banner>
      <rise-affected-widget
        [m_iAffectedPpl]="m_iAffectedPpl"
      ></rise-affected-widget>
      <rise-ongoing-widget
        [m_aoOngoingEvent]="m_aoOngoingEvents"
      ></rise-ongoing-widget>
      <rise-alerts-widget [m_aoAlerts]="m_aoAlerts"></rise-alerts-widget>
    </div>
    <div class="map-container flex-fill">
      <div class="map-user-menu">
        <rise-user-menu class="user-menu"></rise-user-menu>
      </div>

      <div class="map-create-control">
        <rise-button
          *ngIf="!m_bEnableAreaDrawing"
          class="create-area-btn"
          [m_sLabel]="''"
          [m_sIconLeft]="'add'"
          [m_sRole]="'action'"
          [m_sSize]="'small'"
          (click)="startAreaCreation()"
          title="Create new area"
        ></rise-button>
        <rise-button
          *ngIf="m_bEnableAreaDrawing"
          class="cancel-draw-btn"
          [m_sLabel]="''"
          [m_sIconLeft]="'close'"
          [m_sRole]="'danger'"
          [m_sSize]="'small'"
          (click)="cancelAreaCreation()"
          title="Cancel drawing"
        ></rise-button>
      </div>

      <rise-map
        [m_aoAreas]="m_aoAreas"
        [m_bDashboardMap]="true"
        [m_bEnableDashboardDrawing]="m_bEnableAreaDrawing"
        (m_oDashboardAreaDrawn)="onAreaShapeDrawn($event)"
      ></rise-map>
    </div>
  </div>
</main>

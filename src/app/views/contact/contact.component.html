<public-navbar></public-navbar>

<div class="contact-page">

  <!-- CONTACT FORM SECTION -->
  <section class="contact-form-section">
    <div class="contact-form-inner">
      <h1>Contact the RISE Team</h1>
      <p class="contact-form-sub">Fill out the form and we'll get back to you as soon as possible.</p>

      <div class="contact-form-card">
        <div class="form-row">
          <div class="form-group">
            <input type="text" placeholder="First Name" [(ngModel)]="m_sFirstName" />
          </div>
          <div class="form-group">
            <input type="text" placeholder="Last Name" [(ngModel)]="m_sLastName" />
          </div>
        </div>

        <div class="form-group form-group--full">
          <input type="email" placeholder="Email" [(ngModel)]="m_sEmail" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <input type="text" placeholder="Company" [(ngModel)]="m_sCompany" />
          </div>
          <div class="form-group">
            <input type="text" placeholder="Role / Job Title" [(ngModel)]="m_sRole" />
          </div>
        </div>

        <div class="form-group form-group--full">
          <select [(ngModel)]="m_sHowHeard">
            <option value="" disabled selected>How did you hear about RISE?</option>
            <option *ngFor="let opt of m_aoHowHeardOptions" [value]="opt">{{ opt }}</option>
          </select>
        </div>

        <div class="form-group form-group--full">
          <select [(ngModel)]="m_sSubject">
            <option value="" disabled selected>Select a subject</option>
            <option *ngFor="let opt of m_aoSubjectOptions" [value]="opt">{{ opt }}</option>
          </select>
        </div>

        <div class="form-group form-group--full">
          <textarea placeholder="Message" [(ngModel)]="m_sMessage" rows="5"></textarea>
        </div>

        <button class="btn-send" (click)="sendMessage()">SEND</button>
      </div>
    </div>
  </section>

  <!-- CONTACT INFO SECTION -->
  <section class="contact-info-section">
    <div class="contact-info-inner">
      <h2>Our contact information</h2>
      
      <div class="contact-info-list">
        <!-- Email: No icon, only title and email -->
        <div class="contact-info-item contact-info-item--email">
          <div class="info-content">
            <p class="info-label">Email</p>
            <a href="mailto:info&#64;wasdi.cloud">info&#64;wasdi.cloud</a>
          </div>
        </div>

        <!-- Website & LinkedIn -->
        <div class="contact-info-socials">
          <div class="contact-info-item contact-info-item--vertical">
            <div class="info-icon-container">
              <a href="https://www.wasdi.cloud" target="_blank" rel="noopener">
                <img src="/assets/rise-assets/wasdi-logo.png" alt="WASDI Website" class="social-logo" />
              </a>
            </div>
            <div class="info-content">
              <p class="info-label">Website</p>
            </div>
          </div>

          <div class="contact-info-item contact-info-item--vertical">
            <div class="info-icon-container">
              <a href="https://www.linkedin.com/company/wasdi" target="_blank" rel="noopener">
                <img src="/assets/rise-assets/linkedin-icon.png" alt="LinkedIn" class="social-logo social-logo--linkedin" />
              </a>
            </div>
            <div class="info-content">
              <p class="info-label">LinkedIn</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

</div>

<public-footer></public-footer>

<public-navbar></public-navbar>

<div class="contact-page">

  <!-- CONTACT FORM SECTION -->
  <section class="contact-form-section">
    <div class="contact-form-inner">
      <h1>Contact Us</h1>
      <p class="contact-form-sub">Fill in the form and we'll get back to you as soon as possible.</p>

      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" placeholder="First Name" [(ngModel)]="m_sFirstName" />
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" placeholder="Last Name" [(ngModel)]="m_sLastName" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="Email" [(ngModel)]="m_sEmail" />
        </div>
        <div class="form-group">
          <label>Company</label>
          <input type="text" placeholder="Company" [(ngModel)]="m_sCompany" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Role</label>
          <input type="text" placeholder="Role" [(ngModel)]="m_sRole" />
        </div>
        <div class="form-group">
          <label>How did you hear about RISE?</label>
          <select [(ngModel)]="m_sHowHeard">
            <option value="" disabled>Select an option</option>
            <option *ngFor="let opt of m_aoHowHeardOptions" [value]="opt">{{ opt }}</option>
          </select>
        </div>
      </div>

      <div class="form-group form-group--full">
        <label>Subject</label>
        <select [(ngModel)]="m_sSubject">
          <option value="" disabled>Select a subject</option>
          <option *ngFor="let opt of m_aoSubjectOptions" [value]="opt">{{ opt }}</option>
        </select>
      </div>

      <div class="form-group form-group--full">
        <label>Message</label>
        <textarea placeholder="Write your message here..." [(ngModel)]="m_sMessage" rows="6"></textarea>
      </div>

      <button class="btn-cta" (click)="sendMessage()">SEND</button>
    </div>
  </section>

  <!-- CONTACT INFO SECTION -->
  <section class="contact-info-section">
    <div class="contact-info-inner">
      <h2>Contact Information</h2>
      <div class="contact-info-items">
        <div class="contact-info-item">
          <span class="info-icon">✉</span>
          <div>
            <p class="info-label">Email</p>
            <a href="mailto:info&#64;wasdi.cloud">info&#64;wasdi.cloud</a>
          </div>
        </div>
        <div class="contact-info-item">
          <span class="info-icon">📍</span>
          <div>
            <p class="info-label">Address</p>
            <p>Rue de Volmerange 100,<br>Dudelange, Luxembourg</p>
          </div>
        </div>
        <div class="contact-info-item">
          <span class="info-icon">🌐</span>
          <div>
            <p class="info-label">Website</p>
            <a href="https://www.wasdi.cloud" target="_blank" rel="noopener">www.wasdi.cloud</a>
          </div>
        </div>
        <div class="contact-info-item">
          <span class="info-icon">💼</span>
          <div>
            <p class="info-label">LinkedIn</p>
            <a href="https://www.linkedin.com/company/wasdi" target="_blank" rel="noopener">linkedin.com/company/wasdi</a>
          </div>
        </div>
      </div>
    </div>
  </section>

</div>

<public-footer></public-footer>

<div class="create-outlet">
  <div
    class="create-container h-100 d-flex flex-column justify-content-between px-4"
  >
    <div
      class="account-header d-flex flex-row align-items-center justify-content-between mt-2 p-2"
    >
      {{ "AREA_OF_OPERATIONS.CREATE_NEW_AREA_OF_OPERATION" | translate }}
    </div>
    <div class="body flex-fill d-flex flex-row my-3">
      <div class="create-sidebar d-flex flex-column justify-content-between">
        <div class="d-flex flex-column gap-2">
          <rise-text-input
            [m_bHasTitle]="true"
            [(m_sInputText)]="m_oAreaOfOperation.name"
            [m_sLocalizationKey]="'CREATE_NEW_AREA_OF_OPERATION.NAME'"
            [m_sErrorText]="m_sAreaOfOperationNameError"
            [m_bIsValid]="m_bNameIsValid"
            [m_bRequired]="true"
            [m_bIsValidatorInput]="true"
          ></rise-text-input>
          <rise-textarea-input
            [m_bHasTitle]="true"
            [(m_sInputText)]="m_oAreaOfOperation.description"
            [m_sLocalizationKey]="'CREATE_NEW_AREA_OF_OPERATION.DESCRIPTION'"
          ></rise-textarea-input>
          <rise-checkbox
            [m_aoOptions]="m_asIsPublic"
            [m_aoSelectedValues]="m_asSelectedIsPublic"
            [m_bReadonly]="true"></rise-checkbox>

          <div *ngIf="m_bIsSupportArchiveArea" class="align-items-md-start d-flex">
            <span class="toggle-label">{{"CREATE_NEW_AREA_OF_OPERATION.SUPPORT_ARCHIVE" | translate }}</span>
            <mat-slide-toggle labelPosition="before" (change)="onSwitchFullArchiveButton($event)"
                              [(ngModel)]="m_oAreaOfOperation.supportArchive" class="custom-toggle"></mat-slide-toggle>
          </div>
          <div>
            {{ 'CREATE_NEW_AREA_OF_OPERATION.PLUGINS' | translate }}
            <rise-checkbox
              [m_aoOptions]="this.m_asPlugins"
              (m_oSelectionChange)="onSelectionChange($event)"
              [m_aoSelectedValues]="this.m_asPluginsSelected"
              [m_bEnableSelectAll]="true"
              [m_bShowChips]="true"
            >
            </rise-checkbox>
            <div class="invalid-feedback" *ngIf="!m_bPluginsAreValid"></div>
          </div>
          <!--rise-button [m_sLabel]="'CREATE_NEW_AREA_OF_OPERATION.MANAGE_USERS'"></rise-button-->
        </div>
        <div class="d-flex flex-column gap-2">
          <rise-button
            [m_sLabel]="'CREATE_NEW_AREA_OF_OPERATION.SAVE'"
            [m_bDisabled]="!enableAOISubmit()"
            (click)="enableAOISubmit() ? executeAreaOfOperationSaving() : ''"
          ></rise-button>
          <rise-button
            [m_sLabel]="'CREATE_NEW_AREA_OF_OPERATION.CANCEL'"
            [m_sRole]="'muted'"
            [m_bDisabled]=""
            (click)="exitCreatingAreaOfOperation()"
          ></rise-button>
        </div>
      </div>
      <div class="map-container flex-fill">
        <rise-map
          (m_oMapInputChange)="onMapInputChange($event)"
          [m_bIsSelectingArea]="true"
        ></rise-map>
      </div>
    </div>
  </div>
</div>
